name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: cementotrazacr.azurecr.io
  API_IMAGE_NAME: cemento-api
  WEB_IMAGE_NAME: cemento-web
  RESOURCE_GROUP: CementoTrazabilidad-RG

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push API image
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }} \
                     -t ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest \
                     -f CementoTrazabilidad.API/Dockerfile .
        docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest

    - name: Build and push Web image
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }} \
                     -t ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest \
                     -f CementoTrazabilidad.Blazor/Dockerfile .
        docker push ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest

    - name: Deploy API to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: cemento-api
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        imageToDeploy: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}

    - name: Deploy Web to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: cemento-web
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        imageToDeploy: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}